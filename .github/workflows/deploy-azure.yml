# Build image in Azure Container Registry and update Container App on every push to main.
# Required GitHub secret: AZURE_CREDENTIALS (JSON from `az ad sp create-for-rbac --sdk-auth`).

name: Deploy backend to Azure

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-azure.yml"
  workflow_dispatch: {}

env:
  AZURE_RESOURCE_GROUP: rg-xahive-compliance
  CONTAINER_APP_NAME: xahive-cyber
  ACR_NAME: xahivecyber
  IMAGE_NAME: xahive-compliance

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade -y

      - name: Build image in ACR (cloud build, no local Docker)
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --file backend/Dockerfile \
            ./backend

      - name: Update Container App to new image
        run: |
          az containerapp update \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
